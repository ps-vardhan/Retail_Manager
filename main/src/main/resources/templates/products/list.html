<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title>Products</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  </head>
  <body class="container mt-4">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h2>Products</h2>
      <form th:action="@{/logout}" method="post">
        <button class="btn btn-outline-secondary btn-sm">Logout</button>
      </form>
    </div>

    <!-- Semantic search bar. Posts to GET /products/search?q= -->
    <form th:action="@{/products/search}" method="get" class="d-flex mb-4">
      <input
        type="text"
        name="q"
        class="form-control me-2"
        placeholder="Search products semantically..."
        th:value="${query}" />
      <button type="submit" class="btn btn-outline-primary">Search</button>
      <a th:href="@{/products}" class="btn btn-outline-secondary ms-2">Clear</a>
    </form>

    <!-- Banner shown when search returns results -->
    <div th:if="${query}" class="alert alert-info py-2">
      Showing semantic results for: <strong th:text="${query}"></strong>
    </div>

    <div th:if="${param.success}" class="alert alert-success">
      Order placed successfully.
    </div>
    <div th:if="${param.error}" class="alert alert-danger">
      Insufficient stock.
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
      <div class="col" th:each="product : ${products}">
        <div class="card h-100">
          <img
            th:src="${product.thumbnailUrl}"
            th:alt="${product.name}"
            class="card-img-top"
            referrerpolicy="no-referrer"
            onerror="this.style.display = 'none'"
            style="height: 180px; object-fit: contain; padding: 8px" />
          <div class="card-body">
            <h5 class="card-title" th:text="${product.name}"></h5>
            <p
              class="card-text text-muted"
              th:text="${product.description}"></p>
            <p class="card-text">
              <strong th:text="'₹' + ${product.price}"></strong>
            </p>
            <form th:action="@{/orders}" method="post">
              <input type="hidden" name="productId" th:value="${product.id}" />
              <div class="input-group">
                <input
                  type="number"
                  name="quantity"
                  value="1"
                  min="1"
                  class="form-control" />
                <button class="btn btn-primary">Order</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <div th:if="${#lists.isEmpty(products)}" class="text-muted mt-4">
      No products found.
    </div>
  </body>
</html>
