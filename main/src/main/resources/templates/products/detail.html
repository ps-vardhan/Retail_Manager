<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <title th:text="${product.name}">Product</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" />
  </head>
  <body class="container mt-4">
    <a th:href="@{/products}" class="btn btn-outline-secondary mb-3">← Back</a>
    <img
      th:src="${product.thumbnailUrl}"
      th:alt="${product.name}"
      class="img-fluid mb-3 rounded"
      style="max-height: 300px; object-fit: contain" />
    <h2 th:text="${product.name}"></h2>
    <p th:text="${product.description}"></p>
    <p><strong th:text="'₹' + ${product.price}"></strong></p>
    <span class="badge bg-secondary" th:text="${product.category}"></span>
  </body>
</html>
